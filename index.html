<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="backup-banner" style="display: none; background: var(--warning); color: #fff; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 101; flex-wrap: wrap; gap: 1rem; justify-content: center; align-items: center;">
        <span>It's been over 3 days since your last backup! Keep your data safe.</span>
        <button id="btn-banner-backup" class="btn" style="padding: 0.5rem 1rem; background: rgba(0,0,0,0.2);">Save Backup Now</button>
        <button id="btn-banner-dismiss" style="background: none; border: none; color: #fff; cursor: pointer; font-size: 1.5rem; margin-left: 1rem;">&times;</button>
    </div>

    <header class="glass">
        <div class="logo">BT</div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="analytics.html">Expense Info</a></li>
                <li><a href="budget.html">Budget Estimate</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <div class="grid-2">
            <!-- Left Column: Add Expense Form -->
            <section class="card glass">
                <h2>Add Expense</h2>
                <div class="form-group">
                    <label for="date-selector">Select Date</label>
                    <input type="date" id="date-selector">
                </div>

                <div class="form-group">
                    <label>Category (Tag)</label>
                    <div class="tags-container" id="tags-container">
                        <!-- Tags rendered by JS -->
                    </div>
                    <div class="tag-input-row">
                        <input type="text" id="new-tag-name" placeholder="Custom Tag Name">
                        <div class="tag-actions">
                            <input type="text" id="new-tag-icon" placeholder="Icon" style="max-width: 80px; text-align: center;">
                            <button class="btn" id="btn-add-tag" title="Add New Tag">➕ Add</button>
                            <button class="btn btn-warning" id="btn-update-tag" title="Update Tag" style="display: none;">✎ Update</button>
                            <button class="btn btn-danger" id="btn-delete-tag" title="Delete Tag" style="display: none;">🗑 Delete</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="expense-desc">Details (Optional)</label>
                    <input type="text" id="expense-desc" placeholder="Where or what exactly did you spend on?">
                </div>

                <div class="form-group">
                    <label for="expense-amount">Amount (₹/$)</label>
                    <input type="number" id="expense-amount" placeholder="0.00" min="0" step="0.01">
                </div>

                <button class="btn" id="btn-add-expense" style="width: 100%;">Add Expense</button>
            </section>

            <!-- Right Column: Expense List -->
            <section class="card glass">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Expenses</h2>
                    <select id="view-mode" style="width: auto; padding: 0.5rem;">
                        <option value="day">Day View</option>
                        <option value="month">Month View</option>
                    </select>
                </div>
                
                <h3 id="list-title" style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 1rem;">Loading...</h3>
                
                <div id="expense-list">
                    <!-- Expenses rendered by JS -->
                </div>
                
                <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between;">
                    <h3>Total</h3>
                    <h3 id="total-amount">0.00</h3>
                </div>
            </section>
        </div>

    </main>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
